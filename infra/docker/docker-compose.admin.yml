name: cafedebug-admin-local

services:
  admin:
    build:
      context: ../..
      dockerfile: infra/docker/admin/Dockerfile
      target: dev
    image: cafedebug/admin:dev-local
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: ${ADMIN_CONTAINER_PORT:-3000}
      HOSTNAME: 0.0.0.0
      ADMIN_PUBLIC_URL: ${ADMIN_PUBLIC_URL:-http://localhost:3010}
      ADMIN_API_BASE_URL: ${ADMIN_API_BASE_URL_DOCKER:-http://host.docker.internal:8080}
      ADMIN_COOKIE_DOMAIN: ${ADMIN_COOKIE_DOMAIN:-localhost}
      ADMIN_COOKIE_SAMESITE: ${ADMIN_COOKIE_SAMESITE:-Lax}
      ADMIN_COOKIE_SECURE: ${ADMIN_COOKIE_SECURE:-false}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
    ports:
      - "${ADMIN_PORT:-3010}:${ADMIN_CONTAINER_PORT:-3000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: /app/apps/admin
    command: >-
      sh -c "if [ ! -d /app/node_modules/.pnpm ]; then pnpm install --frozen-lockfile; fi;
      pnpm exec next dev --hostname 0.0.0.0 --port ${ADMIN_CONTAINER_PORT:-3000}"
    volumes:
      - ../../:/app
      - admin_node_modules:/app/node_modules
      - admin_app_node_modules:/app/apps/admin/node_modules
      - admin_pnpm_store:/pnpm/store

volumes:
  admin_node_modules:
  admin_app_node_modules:
  admin_pnpm_store:
