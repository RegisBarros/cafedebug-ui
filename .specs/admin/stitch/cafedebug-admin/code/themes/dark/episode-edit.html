<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Episode Editor - CafeDebug</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Cabinet+Grotesk:wght@400;500;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF6B35",
                        "background": "#0F0F11",
                        "surface": "#18181B",
                        "text-main": "#F4F4F5",
                        "text-muted": "#A1A1AA",
                        "border-color": "#27272A",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Cabinet Grotesk", "sans-serif"],
                        "mono": ["ui-monospace", "SFMono-Regular", "Menlo", "Monaco", "Consolas", "Liberation Mono", "Courier New", "monospace"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                    boxShadow: {
                        'soft': '0 8px 30px rgba(0, 0, 0, 0.2)',
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Cabinet Grotesk', sans-serif; background-color: #0F0F11; color: #F4F4F5; }
        h1, h2, h3, h4, h5, h6, .font-display { font-family: 'Space Grotesk', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .material-symbols-outlined[data-weight="fill"] { font-variation-settings: 'FILL' 1; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0F0F11; }
        ::-webkit-scrollbar-thumb { background: #27272A; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #A1A1AA; }

        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }
        
        select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23A1A1AA' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
        }
    </style>
</head>
<body class="bg-background text-text-main antialiased min-h-screen flex flex-col">
<!-- Header / Back Navigation -->
<header class="bg-surface border-b border-border-color sticky top-0 z-20 px-6 py-4 flex items-center justify-between shadow-sm">
<div class="flex items-center gap-4">
<a class="text-text-muted hover:text-text-main transition-colors p-2 rounded-full hover:bg-white/5 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="arrow_back">arrow_back</span>
</a>
<div class="flex flex-col">
<span class="text-xs font-semibold text-text-muted uppercase tracking-wider font-display">Episodes</span>
<span class="text-sm font-medium text-text-main">Editing Episode</span>
</div>
</div>
<div class="flex items-center gap-3">
<span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-md text-xs font-medium bg-amber-500/10 text-amber-500 border border-amber-500/20">
<span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span>
                Draft
            </span>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col md:flex-row max-w-[1600px] w-full mx-auto pb-24">
<!-- Left Column (Main Area) - Episode Title & Notes -->
<div class="w-full md:w-[60%] lg:w-[65%] p-6 md:p-8 lg:p-12 flex flex-col gap-8">
<!-- Title Input -->
<div class="group relative">
<input class="w-full bg-transparent border-0 border-b-2 border-transparent hover:border-border-color focus:border-primary focus:ring-0 text-3xl md:text-4xl lg:text-5xl font-display font-bold text-text-main placeholder:text-text-muted/30 transition-colors py-2 px-0 shadow-none outline-none" placeholder="Episode Title..." type="text" value="Building Scalable Design Systems"/>
</div>
<!-- Markdown Editor -->
<div class="flex flex-col gap-3 flex-1 min-h-[500px]">
<div class="flex items-center justify-between">
<label class="text-sm font-semibold text-text-main font-display">Show Notes</label>
<div class="flex items-center bg-surface rounded-lg p-1 border border-border-color">
<button class="px-3 py-1.5 text-xs font-medium bg-background text-text-main rounded-md shadow-sm border border-border-color" type="button">Write</button>
<button class="px-3 py-1.5 text-xs font-medium text-text-muted hover:text-text-main rounded-md transition-colors" type="button">Preview</button>
</div>
</div>
<div class="border border-border-color rounded-xl bg-surface shadow-soft flex flex-col flex-1 overflow-hidden focus-within:ring-2 focus-within:ring-primary/50 transition-all">
<!-- Toolbar -->
<div class="flex items-center gap-1 p-2 border-b border-border-color bg-white/5 overflow-x-auto">
<button aria-label="Bold" class="p-2 text-text-muted hover:text-text-main hover:bg-white/10 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-primary" type="button">
<span class="material-symbols-outlined text-xl" data-icon="format_bold">format_bold</span>
</button>
<button aria-label="Italic" class="p-2 text-text-muted hover:text-text-main hover:bg-white/10 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-primary" type="button">
<span class="material-symbols-outlined text-xl" data-icon="format_italic">format_italic</span>
</button>
<div class="w-px h-5 bg-border-color mx-1"></div>
<button aria-label="Link" class="p-2 text-text-muted hover:text-text-main hover:bg-white/10 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-primary" type="button">
<span class="material-symbols-outlined text-xl" data-icon="link">link</span>
</button>
<button aria-label="Quote" class="p-2 text-text-muted hover:text-text-main hover:bg-white/10 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-primary" type="button">
<span class="material-symbols-outlined text-xl" data-icon="format_quote">format_quote</span>
</button>
<button aria-label="Code" class="p-2 text-text-muted hover:text-text-main hover:bg-white/10 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-primary" type="button">
<span class="material-symbols-outlined text-xl" data-icon="code">code</span>
</button>
<div class="w-px h-5 bg-border-color mx-1"></div>
<button aria-label="Bulleted List" class="p-2 text-text-muted hover:text-text-main hover:bg-white/10 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-primary" type="button">
<span class="material-symbols-outlined text-xl" data-icon="format_list_bulleted">format_list_bulleted</span>
</button>
<button aria-label="Numbered List" class="p-2 text-text-muted hover:text-text-main hover:bg-white/10 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-primary" type="button">
<span class="material-symbols-outlined text-xl" data-icon="format_list_numbered">format_list_numbered</span>
</button>
</div>
<!-- Textarea -->
<textarea class="flex-1 w-full p-4 border-0 focus:ring-0 resize-none font-mono text-sm leading-relaxed text-text-main bg-transparent placeholder:text-text-muted/30" placeholder="Write your show notes here using Markdown...">In this episode, we dive deep into the architecture of modern design systems...

## Topics Covered
- Semantic tokens vs Component tokens
- Versioning design systems
- The bridge between Figma and React

## Links
- [Linear Design](https://linear.app/design)
- [Ghost CMS](https://ghost.org)</textarea>
</div>
</div>
</div>
<!-- Right Column (Sidebar) - Configuration Fields -->
<aside class="w-full md:w-[40%] lg:w-[35%] bg-surface border-l border-border-color p-6 md:p-8 flex flex-col gap-8 shadow-[-4px_0_24px_-12px_rgba(0,0,0,0.5)] z-10">
<!-- 1. Cover Artwork -->
<div class="flex flex-col gap-3">
<label class="text-sm font-semibold text-text-main font-display">Cover Artwork</label>
<div class="flex items-start gap-4">
<div class="w-24 h-24 bg-background rounded-xl border border-border-color overflow-hidden shrink-0 flex items-center justify-center text-text-muted group relative">
<span class="material-symbols-outlined text-3xl" data-icon="image">image</span>
<input accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" type="file"/>
</div>
<div class="flex flex-col gap-2 pt-1">
<button class="inline-flex items-center justify-center px-4 py-2 text-sm font-medium text-text-main bg-surface border border-border-color rounded-lg hover:bg-white/5 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-surface focus:ring-primary transition-colors w-fit font-display shadow-sm" type="button">
                            Choose Image
                        </button>
<p class="text-xs text-text-muted leading-relaxed">Recommended: 3000x3000px.<br/>Format: JPG or PNG.</p>
</div>
</div>
</div>
<hr class="border-border-color"/>
<!-- 2. Audio URL (Omny.fm) -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-text-main font-display" for="audio-url">Audio URL (omny.fm)</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-text-muted">
<span class="material-symbols-outlined text-[20px]" data-icon="link">link</span>
</div>
<input class="w-full pl-10 pr-4 py-2.5 bg-background border border-border-color rounded-lg text-sm text-text-main focus:ring-2 focus:ring-primary focus:border-primary shadow-sm transition-all" id="audio-url" placeholder="https://omny.fm/shows/..." type="url" value="https://omny.fm/shows/cafedebug/building-scalable-design-systems"/>
</div>
</div>
<!-- 3. Category -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-text-main font-display" for="category">Category</label>
<select class="w-full px-4 py-2.5 bg-background border border-border-color rounded-lg text-sm text-text-main focus:ring-2 focus:ring-primary focus:border-primary shadow-sm transition-all appearance-none" id="category">
<option value="">Select Category</option>
<option selected="" value="development">Development</option>
<option value="design">Design</option>
<option value="career">Career</option>
<option value="soft-skills">Soft Skills</option>
</select>
</div>
<!-- 4. Publish Date -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-text-main font-display" for="publish-date">Publish Date</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-text-muted">
<span class="material-symbols-outlined text-[20px]" data-icon="calendar_today">calendar_today</span>
</div>
<input class="w-full pl-10 pr-4 py-2.5 bg-background border border-border-color rounded-lg text-sm text-text-main focus:ring-2 focus:ring-primary focus:border-primary shadow-sm transition-all" id="publish-date" type="datetime-local" value="2023-10-24T08:00"/>
</div>
</div>
<!-- 5. Tags -->
<div class="flex flex-col gap-3">
<label class="text-sm font-semibold text-text-main font-display" for="tags">Tags</label>
<div class="flex flex-wrap gap-2 mb-1">
<span class="inline-flex items-center gap-1 px-2 py-1 bg-primary/10 border border-primary/20 text-primary text-xs font-medium rounded-md">
                        Design
                        <button class="hover:text-primary/70 transition-colors"><span class="material-symbols-outlined text-xs leading-none" data-icon="close">close</span></button>
</span>
<span class="inline-flex items-center gap-1 px-2 py-1 bg-primary/10 border border-primary/20 text-primary text-xs font-medium rounded-md">
                        Architecture
                        <button class="hover:text-primary/70 transition-colors"><span class="material-symbols-outlined text-xs leading-none" data-icon="close">close</span></button>
</span>
</div>
<input class="w-full px-4 py-2.5 bg-background border border-border-color rounded-lg text-sm text-text-main placeholder:text-text-muted/30 focus:ring-2 focus:ring-primary focus:border-primary shadow-sm transition-all" id="tags" placeholder="Add tag..." type="text"/>
<p class="text-xs text-text-muted">Press enter to add keywords.</p>
</div>
</aside>
</main>
<!-- Sticky Footer Actions -->
<div class="fixed bottom-0 left-0 right-0 bg-surface/80 backdrop-blur-md border-t border-border-color p-4 z-30 shadow-[0_-8px_30px_rgba(0,0,0,0.3)]">
<div class="max-w-[1600px] mx-auto flex items-center justify-between px-2 md:px-4">
<button class="text-sm font-medium text-text-muted hover:text-text-main px-4 py-2 rounded-lg hover:bg-white/5 transition-colors focus:outline-none focus:ring-2 focus:ring-primary" type="button">
                Cancel
            </button>
<div class="flex items-center gap-3">
<button class="px-5 py-2.5 text-sm font-medium text-text-main bg-background border border-border-color rounded-lg hover:bg-white/5 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-surface focus:ring-primary transition-all font-display shadow-sm" type="button">
                    Save Draft
                </button>
<button class="px-6 py-2.5 text-sm font-medium text-white bg-primary rounded-lg hover:brightness-110 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-surface focus:ring-primary transition-all font-display shadow-sm flex items-center gap-2" type="button">
<span class="material-symbols-outlined text-[18px]" data-icon="send">send</span>
                    Publish
                </button>
</div>
</div>
</div>
</body></html>
