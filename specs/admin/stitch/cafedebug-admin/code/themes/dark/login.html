<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CafeDebug - Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: '#FF6B35',
                            50: '#fff7ed',
                            100: '#ffedd5',
                            200: '#fed7aa',
                            300: '#fdba74',
                            400: '#fb923c',
                            500: '#f97316',
                            600: '#FF6B35',
                            700: '#c2410c',
                            800: '#9a3412',
                            900: '#7c2d12',
                        },
                        zinc: {
                            950: '#0F0F11',
                            900: '#18181B',
                        }
                    },
                    fontFamily: {
                        "headline": ["Public Sans", "sans-serif"],
                        "body": ["Public Sans", "sans-serif"],
                        "label": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Public Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-[#0F0F11] text-zinc-100 min-h-screen flex flex-col antialiased">
<header class="bg-[#18181B]/50 backdrop-blur-md border-b border-zinc-800/50 docked full-width top-0 flex justify-between items-center h-16 px-6 w-full z-20">
<div class="flex items-center gap-2">
<span class="text-xl font-bold tracking-tight text-white">CafeDebug</span>
</div>
<div class="flex items-center gap-4">
<button class="text-zinc-400 hover:text-[#FF6B35] transition-colors">
<span class="material-symbols-outlined" data-icon="light_mode">light_mode</span>
</button>
<button class="text-zinc-400 hover:text-[#FF6B35] transition-colors">
<span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
</button>
</div>
</header>
<main class="flex-grow flex items-center justify-center p-6 relative">
<!-- Abstract Background Orbs -->
<div class="absolute inset-0 z-0 overflow-hidden">
<div class="absolute top-[10%] left-[10%] w-[30%] h-[30%] bg-[#FF6B35]/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[10%] right-[10%] w-[30%] h-[30%] bg-orange-900/10 rounded-full blur-[120px]"></div>
</div>
<div class="w-full max-w-[440px] bg-[#18181B] border border-zinc-800 rounded-xl shadow-2xl p-8 md:p-10 relative z-10">
<div class="flex flex-col items-center mb-8">
<div class="w-12 h-12 bg-[#FF6B35] rounded-xl flex items-center justify-center mb-4 shadow-lg shadow-[#FF6B35]/20">
<span class="material-symbols-outlined text-white text-2xl" data-icon="mic" data-weight="fill" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
<h1 class="text-2xl font-extrabold tracking-tight text-white">CafeDebug</h1>
<p class="text-zinc-400 text-sm mt-1">Admin Console Login</p>
</div>
<form action="#" class="space-y-5" method="POST">
<div>
<label class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2" for="email">Email Address</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-zinc-500 text-lg" data-icon="mail">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-[#0F0F11] border border-zinc-800 rounded-lg text-white focus:ring-2 focus:ring-[#FF6B35]/20 focus:border-[#FF6B35] outline-none transition-all placeholder:text-zinc-600" id="email" name="email" placeholder="admin@cafedebug.com" required="" type="email"/>
</div>
</div>
<div>
<label class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2" for="password">Password</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-zinc-500 text-lg" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-[#0F0F11] border border-zinc-800 rounded-lg text-white focus:ring-2 focus:ring-[#FF6B35]/20 focus:border-[#FF6B35] outline-none transition-all placeholder:text-zinc-600" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-zinc-300" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center">
<input class="h-4 w-4 text-[#FF6B35] focus:ring-[#FF6B35] border-zinc-700 bg-zinc-900 rounded" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-zinc-400" for="remember-me">Remember me</label>
</div>
<a class="text-sm font-medium text-[#FF6B35] hover:text-[#ff8554] transition-colors" href="#">Forgot Password?</a>
</div>
<button class="w-full bg-[#FF6B35] text-white font-bold py-3.5 rounded-lg shadow-md hover:bg-[#ff8554] active:opacity-80 transition-all focus:outline-none focus:ring-2 focus:ring-[#FF6B35] focus:ring-offset-2 focus:ring-offset-[#18181B]" type="submit">
                    Sign In
                </button>
</form>
<div class="mt-8 pt-6 border-t border-zinc-800 flex flex-col items-center gap-4">
<p class="text-xs text-zinc-500">Secure access for authorized administrators only.</p>
<div class="flex items-center gap-2">
<img alt="CafeDebug Logo" class="w-5 h-5 rounded-sm" data-alt="Small minimalistic orange logo icon for a podcast called CafeDebug on a white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC6yWdYVldttNFvVP4uglb_bKUiETN-pIFl8F9JU-PXGZGGuAd0f_xjP7Lc5PkPFkKFlPTknRGtdIrPesSJNj_5rJgQjHlcX9N9CPJZ0eyrJEQUoIdMc-z7kAvDaquoZ97WG_gOU10ikx9dB2rdlMXuojUTz-THoijeqntPdL19jHMX-C7xXdf9Sfg5EHklwm5NnEvs-uOT9H96CORkoaaxK01-aQQOTO_W7nM_O54WIW-Fi9tOtDCKdkuo2uiEW3nfM6moNhr9J24"/>
<span class="text-zinc-800">|</span>
<span class="text-xs font-bold text-zinc-500 tracking-widest uppercase">CafeDebug</span>
</div>
</div>
</div>
</main>
<footer class="w-full py-8 flex flex-col items-center gap-4 mt-auto bg-transparent relative z-10">
<div class="flex gap-6">
<a class="text-xs text-zinc-500 hover:text-[#FF6B35] underline transition-all underline-offset-4" href="#">Privacy Policy</a>
<a class="text-xs text-zinc-500 hover:text-[#FF6B35] underline transition-all underline-offset-4" href="#">Terms of Service</a>
<a class="text-xs text-zinc-500 hover:text-[#FF6B35] underline transition-all underline-offset-4" href="#">Support</a>
</div>
<p class="text-xs text-zinc-600">© 2024 CafeDebug Admin. All rights reserved.</p>
</footer>
</body></html>
